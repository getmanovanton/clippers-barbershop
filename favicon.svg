<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <clipPath id="pole">
      <rect x="10" y="6" width="12" height="20" rx="3"/>
    </clipPath>
    <pattern id="sp" patternUnits="userSpaceOnUse" width="9" height="9" patternTransform="rotate(-52 16 16)">
      <rect width="2.8" height="9" fill="#C8102E"/>
      <rect x="2.8" width="2.8" height="9" fill="#F5F5F3"/>
      <rect x="5.6" width="1.7" height="9" fill="#1B3A7A"/>
      <rect x="7.3" width="1.7" height="9" fill="#F5F5F3"/>
    </pattern>
  </defs>
  <!-- top cap -->
  <rect x="8" y="2" width="16" height="6" rx="3" fill="#d0d0cd"/>
  <rect x="8" y="2" width="16" height="3" rx="3" fill="#e8e8e5"/>
  <!-- pole stripes -->
  <rect x="10" y="6" width="12" height="20" fill="url(#sp)" clip-path="url(#pole)"/>
  <!-- cylindrical light left -->
  <rect x="10" y="6" width="3.5" height="20" fill="white" fill-opacity="0.32" clip-path="url(#pole)"/>
  <!-- cylindrical shadow right -->
  <rect x="18.5" y="6" width="3.5" height="20" fill="black" fill-opacity="0.14" clip-path="url(#pole)"/>
  <!-- bottom cap -->
  <rect x="8" y="24" width="16" height="6" rx="3" fill="#b0b0ad"/>
  <rect x="8" y="24" width="16" height="3" rx="0" fill="#c8c8c5"/>
</svg>
