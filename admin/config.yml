backend:
  name: git-gateway
  branch: master

media_folder: "images/barbers"
public_folder: "/images/barbers"

collections:
  - name: "barbers"
    label: "Barbers"
    files:
      - name: "barbers_list"
        label: "Barbers List"
        file: "data/barbers.json"
        fields:
          - name: "barbers"
            label: "Barbers"
            widget: "list"
            label_singular: "Barber"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Role", name: "role", widget: "string", hint: "e.g. Top Barber, Fade Specialist" }
              - { label: "Bio", name: "bio", widget: "text" }
              - { label: "Photo", name: "photo", widget: "image" }
              - { label: "Reviews", name: "reviews", widget: "string", hint: "e.g. 245 reviews on Google" }
              - { label: "Book URL", name: "bookUrl", widget: "string", default: "https://n802209.alteg.io" }
